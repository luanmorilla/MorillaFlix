<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MorillaFlix - Filmes e Séries</title>
    <link rel="stylesheet" href="style.css">
    <script src="config.js" defer></script>
    <script src="script.js" defer></script>
</head>
<body>

    <!-- Header -->
    <header>
        <h1>🎬 MorillaFlix</h1>
    </header>

    <!-- Banner de destaque -->
    <section id="featured-banner"></section>

    <!-- Busca por gênero -->
    <section class="search-container">
        <input type="text" id="search-input" placeholder="Digite o gênero (Ação, Comédia...)">
        <button id="search-button">Buscar</button>
        <button id="surprise-button">Surpreenda-me</button>
    </section>

    <!-- Container de filmes -->
    <section id="results"></section>

</body>
</html>
