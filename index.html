<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MorillaFlix - Filmes e Séries</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

    <!-- Header -->
    <header class="header">
        <h1>🎬 MorillaFlix</h1>
        <p>Explore filmes e séries por gênero ou deixe a IA te surpreender!</p>
    </header>

    <!-- Banner de destaque -->
    <section id="featured-banner" class="featured-banner"></section>

    <!-- Busca por gênero -->
    <section class="search-container">
        <input type="text" id="search-input" placeholder="Digite o gênero (Ação, Comédia...)">
        <button id="search-button">Buscar</button>
        <button id="surprise-button">Surpreenda-me</button>
    </section>

    <!-- Container de filmes -->
    <section id="results" class="results-container"></section>

    <!-- Footer simples -->
    <footer class="footer">
        <p>MorillaFlix &copy; 2025</p>
    </footer>

</body>
</html>
